# ==========================================
# Server Configuration (Render Compatible)
# ==========================================
server.port=${PORT:8080}
server.servlet.context-path=

# ==========================================
# Neon PostgreSQL Database Configuration
# ==========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require

spring.datasource.username=${DB_USERNAME}

spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==========================================
# JWT Security Configuration
# ==========================================
app.jwt.secret=${JWT_SECRET}

# 1 Day in milliseconds
app.jwt.expiration=86400000

# 7 Days in milliseconds
app.jwt.refreshExpiration=604800000

# ==========================================
# Live Simulation and Logging Configuration
# ==========================================
logging.level.root=INFO
logging.level.com.devsecops.dashboard=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# ==========================================
# Spring Doc / Swagger OpenAPI Config
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ==========================================
# JavaMail Sender SMTP Configuration
# ==========================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true

# TLS Configuration
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# SSL Trust
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Connection Timeouts (Increased)
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# Debug Logging
spring.mail.properties.mail.debug=true

# Optional SMTP Properties
spring.mail.properties.mail.smtp.quitwait=false
spring.mail.properties.mail.smtp.socketFactory.fallback=true
