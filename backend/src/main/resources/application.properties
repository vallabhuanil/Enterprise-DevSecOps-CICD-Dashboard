# ==========================================
# Server Configuration (Render Compatible)
# ==========================================
server.port=${PORT:8080}
server.servlet.context-path=

# ==========================================
# Neon PostgreSQL Database Configuration
# ==========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require

spring.datasource.username=${DB_USERNAME}

spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==========================================
# JWT Security Configuration
# ==========================================
app.jwt.secret=${JWT_SECRET}

# 1 Day in milliseconds
app.jwt.expiration=86400000

# 7 Days in milliseconds
app.jwt.refreshExpiration=604800000

# ==========================================
# Live Simulation and Logging Configuration
# ==========================================
logging.level.root=INFO
logging.level.com.devsecops.dashboard=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# ==========================================
# Spring Doc / Swagger OpenAPI Config
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# ==========================================
# JavaMail Sender SMTP Configuration
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=${MAIL_USERNAME}

spring.mail.password=${MAIL_PASSWORD}

spring.mail.from=${MAIL_FROM}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
